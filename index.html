<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Hello World!</h1>
    <p>Hello everyone!</p>
    <hr><br>
    <a href="https://www.google.com" target="_blank">Visit Google</a>
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>
    <form action=""></form>
        <label for="name">Enter Your Name :</label>
        <input type="text" id="name" name = "name" placeholder = "enter your name here">
        <br>
        <label for="password">Enter Your Password :</label>
        <input type="password" id="password" name = "password" placeholder = "enter your password here">
        <br>
        <label for="email">Enter Your Email :</label>
        <input type="email" id="email" name ="email" placeholder ="enter Your Email here">
        <br>
        <button type ="submit">Submit</button>
        <button type ="reset">Reset</button>
        <br>
        <label for="gender">Select Your Gender :</label>
        <input type="radio" id="male" name="gender" >
        <label for="male">Male</label>
        <input type="radio" id="female" name = "gender" >
        <label for="female">Female</label>
        <br>
        <label for="branch">Select Your Branch :</label>
        <select name="branch" id="branch">
            <option value="JAVA">JAVA</option>
            <option value="Python">Python</option>
            <option value="JavaScript">JavaScript</option>
        </select>
        <br>
        <label for="textarea">Enter Your Queries :</label>
        <br>
        <textarea name="textarea" id="textarea" placeholder="Enter your queries here"></textarea>
        <br>
        <label for="checkbox">Subscribe to Newsletter :</label>
        <input type="checkbox" id="checkbox" name="checkbox">
    </form>
</body>
</html>
